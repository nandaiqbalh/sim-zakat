
services:
  db:
    image: postgres:15
    restart: always
    env_file:
      - .env.docker
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-5432}:${DB_PORT:-5432}"

  app:
    # in production we expect to use a pre-built image instead of building
    # on every deploy; build locally with `docker compose -f
    # docker-compose.dev.yml build` and push to your registry if needed.
    image: multi-auth-app:latest
    entrypoint: ["/app/entrypoint.sh"]
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    depends_on:
      - db

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  pgdata:
